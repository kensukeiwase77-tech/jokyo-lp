<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株式会社７PRIDE｜人生を、動かそう。</title>
<meta name="description" content="株式会社７PRIDEは、就職・住まい・ライフライン・保険をワンストップで支援する会社です。上京や転職など人生の転機にある方を、一気通貫でサポートします。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ===== RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:        #1E2D5E;
  --navy-dark:   #111B3C;
  --navy-light:  #2B4080;
  --orange:      #FF5C35;
  --orange-light:#FF7A58;
  --orange-bg:   #FFF3F0;
  --gold:        #FFB800;
  --green:       #06C755;
  --green-dark:  #049a41;
  --bg:          #F8F8FC;
  --white:       #FFFFFF;
  --text:        #1A1A2E;
  --text-mid:    #555577;
  --text-light:  #8888AA;
  --border:      #E0E0F0;
  --shadow:      0 4px 24px rgba(30,45,94,.10);
  --shadow-lg:   0 8px 40px rgba(30,45,94,.16);
  --radius:      16px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: var(--text);
  background: var(--white);
  line-height: 1.7;
  overflow-x: hidden;
}

/* ===== UTILITIES ===== */
.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
.section-tag {
  display: inline-block;
  font-size: 11px; font-weight: 700; letter-spacing: .15em;
  color: var(--orange); background: var(--orange-bg);
  padding: 5px 14px; border-radius: 30px; margin-bottom: 12px;
}
.section-tag.light { color: var(--orange-light); background: rgba(255,92,53,.15); }
.section-title {
  font-size: clamp(24px, 5vw, 38px); font-weight: 900;
  line-height: 1.35; margin-bottom: 12px;
}
.section-title .accent { color: var(--orange); }
.section-title.center { text-align: center; }
.section-title.white  { color: var(--white); }
.section-lead {
  font-size: clamp(13px, 2vw, 15px); color: var(--text-mid); line-height: 1.85;
}
.section-lead.center { text-align: center; margin: 0 auto; max-width: 560px; }
.section-lead.white  { color: rgba(255,255,255,.78); }
.section-divider {
  width: 56px; height: 4px; background: var(--orange);
  border-radius: 4px; margin: 14px auto 0;
}
.section-divider.left { margin-left: 0; }

.fade-up {
  opacity: 0; transform: translateY(28px);
  transition: opacity .6s ease, transform .6s ease;
}
.fade-up.visible { opacity: 1; transform: translateY(0); }

/* ===== HEADER ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 999;
  background: rgba(17,27,60,.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  transition: all .3s;
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; padding: 0 20px;
  max-width: 1200px; margin: 0 auto;
}
.logo {
  font-size: 22px; font-weight: 900; color: var(--white);
  text-decoration: none; letter-spacing: .04em;
}
.logo span { color: var(--orange); }

.nav-list { display: none; list-style: none; gap: 24px; }
.nav-list a {
  color: rgba(255,255,255,.82); text-decoration: none;
  font-size: 13px; font-weight: 500; transition: color .2s;
}
.nav-list a:hover { color: var(--orange); }

.btn-header {
  background: var(--orange); color: white; border: none;
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 9px 20px; border-radius: 30px;
  cursor: pointer; text-decoration: none; transition: all .2s;
  white-space: nowrap;
}
.btn-header:hover { background: var(--orange-light); transform: translateY(-1px); }

.hamburger {
  display: flex; flex-direction: column; gap: 5px;
  cursor: pointer; padding: 8px; border: none; background: transparent;
}
.hamburger span {
  display: block; width: 24px; height: 2px;
  background: white; border-radius: 2px; transition: all .3s;
}

@media (min-width: 768px) {
  .nav-list { display: flex; }
  .hamburger { display: none; }
}

/* Mobile menu */
.mobile-menu {
  position: fixed; top: 64px; left: 0; right: 0;
  background: var(--navy-dark); border-bottom: 1px solid rgba(255,255,255,.1);
  z-index: 998; padding: 16px;
  transform: translateY(-10px); opacity: 0;
  transition: all .3s; pointer-events: none;
}
.mobile-menu.open { transform: translateY(0); opacity: 1; pointer-events: all; }
.mobile-menu ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.mobile-menu a {
  display: block; color: rgba(255,255,255,.85); text-decoration: none;
  font-size: 15px; font-weight: 500; padding: 11px 14px;
  border-radius: 10px; transition: all .2s;
}
.mobile-menu a:hover { color: var(--orange); background: rgba(255,92,53,.1); }
.mobile-menu-cta { margin-top: 14px; }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="logo"><span>7</span>PRIDE</a>
    <nav>
      <ul class="nav-list">
        <li><a href="#services">サービス</a></li>
        <li><a href="#strengths">選ばれる理由</a></li>
        <li><a href="#flow">利用の流れ</a></li>
        <li><a href="#values">企業理念</a></li>
      </ul>
    </nav>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="line-survey.html" class="btn-header">無料相談をはじめる</a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobile-menu">
  <ul>
    <li><a href="#services"  onclick="closeMenu()">サービス</a></li>
    <li><a href="#strengths" onclick="closeMenu()">選ばれる理由</a></li>
    <li><a href="#flow"      onclick="closeMenu()">利用の流れ</a></li>
    <li><a href="#values"    onclick="closeMenu()">企業理念</a></li>
  </ul>
  <div class="mobile-menu-cta">
    <a href="line-survey.html" class="btn-header" style="display:block;text-align:center;border-radius:12px;padding:13px;">
      📋 無料相談をはじめる
    </a>
  </div>
</div>

<!-- ★ 以降のセクションをここに追加していく ★ -->

</body>
</html>
